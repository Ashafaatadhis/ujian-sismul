version: '3.8'

services:
  web:
    build: .
    container_name: sismul19_web
    ports:
      - "8081:80"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root123
      DB_NAME: sismul19
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./application/logs:/var/www/html/application/logs
      - ./application/cache:/var/www/html/application/cache
      - ./upload:/var/www/html/upload
    command: bash -c "mkdir -p /var/www/html/upload/kamar && chmod -R 777 /var/www/html/upload && apache2-foreground"

  db:
    image: mysql:8.0
    container_name: sismul19_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: sismul19
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
